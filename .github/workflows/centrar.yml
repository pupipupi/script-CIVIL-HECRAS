name: Centrar Secciones HEC-RAS

on:
  workflow_dispatch:     # Solo se ejecuta manualmente desde Actions → Run workflow

jobs:
  centrar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar script de centrado
        run: python centrar_secciones.py geo.txt geo_centrado.txt

      - name: Guardar geo_centrado.txt como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: geo_centrado
          path: geo_centrado.txt
