name: Procesar TXT

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - run: python reenumerar_stations_KIMI_v1.py input.txt

    - uses: actions/upload-artifact@v4
      with:
        name: resultado
        path: "*_transformado.txt"
